<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Plain white tote bag product photo">
  <defs>
    <linearGradient id="bgt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f4f2"/><stop offset="1" stop-color="#e4e4e0"/>
    </linearGradient>
    <linearGradient id="fabt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eeeeee"/>
    </linearGradient>
    <radialGradient id="sht" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000" stop-opacity="0.16"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bgt)"/>
  <ellipse cx="300" cy="510" rx="160" ry="28" fill="url(#sht)"/>
  <!-- handles -->
  <path fill="none" stroke="#d0d0cc" stroke-width="10" stroke-linecap="round"
    d="M250 196 C250 120, 252 110, 270 110 C288 110, 290 130, 290 196"/>
  <path fill="none" stroke="#d0d0cc" stroke-width="10" stroke-linecap="round"
    d="M310 196 C310 130, 312 110, 330 110 C348 110, 350 120, 350 196"/>
  <!-- bag body -->
  <path fill="url(#fabt)" stroke="#d6d6d2" stroke-width="2" stroke-linejoin="round"
    d="M192 196 L408 196 L420 500 L180 500 Z"/>
  <!-- top hem -->
  <path fill="none" stroke="#e4e4e0" stroke-width="2.5" d="M192 214 L408 214"/>
  <!-- subtle folds -->
  <path fill="none" stroke="#efefed" stroke-width="2.5" stroke-linecap="round" opacity="0.8" d="M250 230 L256 490"/>
  <path fill="none" stroke="#efefed" stroke-width="2.5" stroke-linecap="round" opacity="0.8" d="M348 230 L344 490"/>
  <path fill="none" stroke="#f1f1ef" stroke-width="2" stroke-linecap="round" opacity="0.7" d="M300 230 L300 490"/>
</svg>
